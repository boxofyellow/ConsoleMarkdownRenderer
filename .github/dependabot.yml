updates:
- directories:
  - /
  - /ConsoleMarkdownRenderer.Example
  - /ConsoleMarkdownRenderer.ExampleTests
  - /ConsoleMarkdownRenderer.Fakes
  - /ConsoleMarkdownRenderer.Fakes.Tests
  - /ConsoleMarkdownRenderer.Tests
  - /ConsoleMarkdownRenderer.Spectre
  - /ConsoleMarkdownRenderer.Spectre.Tests
  groups:
    nuget-dependencies:
      patterns:
      - "*"
  package-ecosystem: nuget
  schedule:
    interval: weekly
- directory: /
  groups:
    github-actions:
      patterns:
      - "*"
  ignore:
  - dependency-name: "github/gh-aw-actions/**"
  - dependency-name: "github/gh-aw-actions" # Managed by gh aw compile. Version-locked to the gh-aw compiler; do not bump.
  package-ecosystem: github-actions
  schedule:
    interval: weekly
version: 2
