name: CI
on:
  push:
    branches:
    - main
    paths-ignore:
    - 'docs/**'
    - 'README.md'
  pull_request:
    branches:
    - main
    paths-ignore:
    - 'docs/**'
    - 'README.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        dotnet-version: [8.0.x, 10.0.x]
        include:
        - dotnet-version: 8.0.x
          target-framework: net8.0
        - dotnet-version: 10.0.x
          target-framework: net10.0
    timeout-minutes: 5
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
    - name: Build Example
      run: dotnet build --configuration Release --framework ${{ matrix.target-framework }} ConsoleMarkdownRenderer.Example
    - name: Test Specs
      run: dotnet test --configuration Release --framework ${{ matrix.target-framework }} ConsoleMarkdownRenderer.Spectre.Tests
    - name: Test
      run: dotnet test --configuration Release --framework ${{ matrix.target-framework }} ConsoleMarkdownRenderer.Tests
    - name: Test Fakes
      run: dotnet test --configuration Release --framework ${{ matrix.target-framework }} ConsoleMarkdownRenderer.Fakes.Tests
    - name: Test ExampleTests
      run: dotnet test --configuration Release --framework ${{ matrix.target-framework }} ConsoleMarkdownRenderer.ExampleTests
    - name: Run Example
      run: dotnet run --configuration Release --framework ${{ matrix.target-framework }} --project ConsoleMarkdownRenderer.Example