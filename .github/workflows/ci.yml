on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        dotnet-version: [8.0.x, 10.0.x]
        include:
        - dotnet-version: 8.0.x
          target-framework: net8.0
          run-tests: "true"
        - dotnet-version: 10.0.x
          target-framework: net10.0
          run-tests: "false"
    timeout-minutes: 5
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
    - name: Build Library
      run: dotnet build --configuration Release --framework ${{ matrix.target-framework }} ConsoleMarkdownRenderer.csproj
    - name: Build Fakes
      run: dotnet build --configuration Release --framework ${{ matrix.target-framework }} ConsoleMarkdownRenderer.Fakes
    - name: Build Example
      run: dotnet build --configuration Release --framework ${{ matrix.target-framework }} ConsoleMarkdownRenderer.Example
    - name: Test
      if: ${{ matrix.run-tests == 'true' }}
      run: dotnet test --configuration Release --framework net8.0 ConsoleMarkdownRenderer.Tests
    - name: Test ExampleTests
      if: ${{ matrix.run-tests == 'true' }}
      run: dotnet test --configuration Release --framework net8.0 ConsoleMarkdownRenderer.ExampleTests
