name: CI
on:
  push:
    branches:
    - main
    paths-ignore:
    - 'docs/**'
    - 'README.md'
  pull_request:
    branches:
    - main
    paths-ignore:
    - 'docs/**'
    - 'README.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        dotnet-version: [8.0.x, 10.0.x]
        include:
        - dotnet-version: 8.0.x
          target-framework: net8.0
        - dotnet-version: 10.0.x
          target-framework: net10.0
    timeout-minutes: 5
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
    - name: Build Example
      run: dotnet build --configuration Release --framework ${{ matrix.target-framework }} ConsoleMarkdownRenderer.Example
    - name: Test
      run: dotnet test --configuration Release --framework ${{ matrix.target-framework }} ConsoleMarkdownRenderer.Tests
    - name: Test ExampleTests
      run: dotnet test --configuration Release --framework ${{ matrix.target-framework }} ConsoleMarkdownRenderer.ExampleTests
    - name: Run Example
      run: dotnet run --configuration Release --framework ${{ matrix.target-framework }} --project ConsoleMarkdownRenderer.Example