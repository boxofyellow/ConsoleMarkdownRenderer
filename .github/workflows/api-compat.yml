name: API Compatibility Check
on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api-compat:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: 10.0.x

    - name: Install ApiCompat Tool
      run: dotnet tool install --global Microsoft.DotNet.ApiCompat.Tool

    - name: Set verbosity level
      run: |
        if [ "${{ runner.debug }}" == "1" ]; then
          echo "VERBOSITY=high" >> $GITHUB_ENV
        else
          echo "VERBOSITY=normal" >> $GITHUB_ENV
        fi

    - name: Prepare output directory
      run: mkdir -p ./api-compat-output

    - name: Check API Compatibility - ConsoleMarkdownRenderer
      id: check-cmr
      continue-on-error: true
      run: |
        ./scripts/check-api-compat.sh \
          "BoxOfYellow.ConsoleMarkdownRenderer" \
          "ConsoleMarkdownRenderer.csproj" \
          "ConsoleMarkdownRenderer" \
          "net10.0" \
          "./api-compat-output/cmr-output.txt" \
          "${{ env.VERBOSITY }}"

    - name: Check API Compatibility - ConsoleMarkdownRenderer.Fakes
      id: check-fakes
      continue-on-error: true
      run: |
        ./scripts/check-api-compat.sh \
          "BoxOfYellow.ConsoleMarkdownRenderer.Fakes" \
          "ConsoleMarkdownRenderer.Fakes" \
          "ConsoleMarkdownRenderer.Fakes" \
          "net10.0" \
          "./api-compat-output/fakes-output.txt" \
          "${{ env.VERBOSITY }}"

    - name: Create summary
      if: always()
      run: |
        echo "=== API Compatibility Check Summary ===" > ./api-compat-output/summary.txt
        echo "Run Date: $(date -u)" >> ./api-compat-output/summary.txt
        echo "Commit: ${{ github.sha }}" >> ./api-compat-output/summary.txt
        echo "" >> ./api-compat-output/summary.txt
        echo "ConsoleMarkdownRenderer check result: ${{ steps.check-cmr.conclusion }}" >> ./api-compat-output/summary.txt
        echo "ConsoleMarkdownRenderer.Fakes check result: ${{ steps.check-fakes.conclusion }}" >> ./api-compat-output/summary.txt

    - name: Upload API compatibility output
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: api-compat-output
        path: ./api-compat-output/

    - name: Check for breaking changes
      if: always()
      run: |
        FAILED=false

        if [ "${{ steps.check-cmr.conclusion }}" == "failure" ]; then
          echo "::error::Breaking API changes detected in ConsoleMarkdownRenderer"
          FAILED=true
        fi

        if [ "${{ steps.check-fakes.conclusion }}" == "failure" ]; then
          echo "::error::Breaking API changes detected in ConsoleMarkdownRenderer.Fakes"
          FAILED=true
        fi

        if [ "$FAILED" == "true" ]; then
          echo ""
          echo "Breaking changes were detected. Review the API compatibility output artifact for details."
          echo "If these changes are intentional, consider bumping the minor version."
          exit 1
        fi

        echo "No breaking API changes detected."
