# Created from https://acraven.medium.com/a-nuget-package-workflow-using-github-actions-7da8c6557863
name: NuGet Publish on New Version Tag
on:
  push:
    tags:
    - "v[0-9]+.[0-9]+.[0-9]+"
jobs:
  build:
    permissions:
      contents: read
      id-token: write  # enable GitHub OIDC token issuance for this job to publish to nuget
  
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
      with:
        dotnet-version: |
          8.0.x
          10.0.x
    - name: Verify commit exists in origin/main
      run: git branch --remote --contains | grep origin/main
    - name: Set VERSION variable from tag
      run: echo "VERSION=${GITHUB_REF/refs\/tags\/v/}" >> $GITHUB_ENV
    - name: Build and pack packages
      uses: ./.github/actions/build-and-pack
      with:
        version: ${{ env.VERSION }}
    - name: Build and test (net8.0)
      uses: ./.github/actions/build-and-test
      with:
        version: ${{ env.VERSION }}
        framework: net8.0
    - name: Build and test (net10.0)
      uses: ./.github/actions/build-and-test
      with:
        version: ${{ env.VERSION }}
        framework: net10.0

    # Get a short-lived NuGet API key, and then push our packages
    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
      id: login
      with:
        user: ${{ secrets.NUGET_USER }}
    - name: Push Spectre
      run: dotnet nuget push ./artifacts/BoxOfYellow.ConsoleMarkdownRenderer.Spectre.${VERSION}.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{steps.login.outputs.NUGET_API_KEY}}
    - name: Push
      run: dotnet nuget push ./artifacts/BoxOfYellow.ConsoleMarkdownRenderer.${VERSION}.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{steps.login.outputs.NUGET_API_KEY}}
    - name: Push Fakes
      run: dotnet nuget push ./artifacts/BoxOfYellow.ConsoleMarkdownRenderer.Fakes.${VERSION}.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{steps.login.outputs.NUGET_API_KEY}}
