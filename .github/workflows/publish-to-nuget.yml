# Created from https://acraven.medium.com/a-nuget-package-workflow-using-github-actions-7da8c6557863
on:
  push:
    tags:
    - "v[0-9]+.[0-9]+.[0-9]+"
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          10.0.x
    - name: Verify commit exists in origin/main
      run: git branch --remote --contains | grep origin/main
    - name: Set VERSION variable from tag
      run: echo "VERSION=${GITHUB_REF/refs\/tags\/v/}" >> $GITHUB_ENV
    - name: Build (net8.0)
      run: dotnet build --configuration Release --framework net8.0 /p:Version=${VERSION} /p:ContinuousIntegrationBuild=true ConsoleMarkdownRenderer.csproj
    - name: Build (net10.0)
      run: dotnet build --configuration Release --framework net10.0 /p:Version=${VERSION} /p:ContinuousIntegrationBuild=true ConsoleMarkdownRenderer.csproj
    - name: Test
      run: dotnet test --configuration Release /p:Version=${VERSION} /p:ContinuousIntegrationBuild=true ConsoleMarkdownRenderer.Tests
    - name: Build Example (net8.0)
      run: dotnet build --configuration Release --framework net8.0 /p:Version=${VERSION} /p:ContinuousIntegrationBuild=true ConsoleMarkdownRenderer.Example
    - name: Build Example (net10.0)
      run: dotnet build --configuration Release --framework net10.0 /p:Version=${VERSION} /p:ContinuousIntegrationBuild=true ConsoleMarkdownRenderer.Example
    - name: Smoke Run Example (net8.0)
      run: dotnet run --configuration Release --framework net8.0 --project ConsoleMarkdownRenderer.Example -- --help
    - name: Smoke Run Example (net10.0)
      run: dotnet run --configuration Release --framework net10.0 --project ConsoleMarkdownRenderer.Example -- --help
    - name: Pack
      run: dotnet pack --configuration Release /p:Version=${VERSION} /p:ContinuousIntegrationBuild=true --no-build --output ./artifacts ConsoleMarkdownRenderer.csproj
    - name: Add local NuGet source
      run: dotnet nuget add source "$GITHUB_WORKSPACE/artifacts" --name local
    - name: Build Fakes (net8.0)
      run: dotnet build --configuration Release --framework net8.0 /p:Version=${VERSION} /p:UsePackageReference=true /p:ContinuousIntegrationBuild=true ConsoleMarkdownRenderer.Fakes
    - name: Build Fakes (net10.0)
      run: dotnet build --configuration Release --framework net10.0 /p:Version=${VERSION} /p:UsePackageReference=true /p:ContinuousIntegrationBuild=true ConsoleMarkdownRenderer.Fakes
    - name: Pack Fakes
      run: dotnet pack --configuration Release /p:Version=${VERSION} /p:UsePackageReference=true /p:ContinuousIntegrationBuild=true --no-build --output ./artifacts ConsoleMarkdownRenderer.Fakes
    - name: Test ExampleTests
      run: dotnet test --configuration Release /p:Version=${VERSION} /p:ContinuousIntegrationBuild=true ConsoleMarkdownRenderer.ExampleTests
    - name: Push
      run: dotnet nuget push ./artifacts/BoxOfYellow.ConsoleMarkdownRenderer.${VERSION}.nupkg --source https://api.nuget.org/v3/index.json --api-key ${API_KEY}
      env:
        API_KEY: ${{ secrets.NUGET_API_KEY }}
    - name: Push Fakes
      run: dotnet nuget push ./artifacts/BoxOfYellow.ConsoleMarkdownRenderer.Fakes.${VERSION}.nupkg --source https://api.nuget.org/v3/index.json --api-key ${API_KEY}
      env:
        API_KEY: ${{ secrets.NUGET_API_KEY }}
