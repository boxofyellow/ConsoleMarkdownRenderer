# Created from https://acraven.medium.com/a-nuget-package-workflow-using-github-actions-7da8c6557863
name: NuGet Publish on New Version Tag
on:
  push:
    tags:
    - "v[0-9]+.[0-9]+.[0-9]+"
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
      with:
        dotnet-version: |
          8.0.x
          10.0.x
    - name: Verify commit exists in origin/main
      run: git branch --remote --contains | grep origin/main
    - name: Set VERSION variable from tag
      run: echo "VERSION=${GITHUB_REF/refs\/tags\/v/}" >> $GITHUB_ENV
    - name: Build and pack packages
      uses: ./.github/actions/build-and-pack
      with:
        version: ${{ env.VERSION }}
    - name: Build and test (net8.0)
      uses: ./.github/actions/build-and-test
      with:
        version: ${{ env.VERSION }}
        framework: net8.0
    - name: Build and test (net10.0)
      uses: ./.github/actions/build-and-test
      with:
        version: ${{ env.VERSION }}
        framework: net10.0
    - name: Push
      run: dotnet nuget push ./artifacts/BoxOfYellow.ConsoleMarkdownRenderer.${VERSION}.nupkg --source https://api.nuget.org/v3/index.json --api-key ${API_KEY}
      env:
        API_KEY: ${{ secrets.NUGET_API_KEY }}
    - name: Push Fakes
      run: dotnet nuget push ./artifacts/BoxOfYellow.ConsoleMarkdownRenderer.Fakes.${VERSION}.nupkg --source https://api.nuget.org/v3/index.json --api-key ${API_KEY}
      env:
        API_KEY: ${{ secrets.NUGET_API_KEY }}
