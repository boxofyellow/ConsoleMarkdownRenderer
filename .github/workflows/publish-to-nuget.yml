# Created from https://acraven.medium.com/a-nuget-package-workflow-using-github-actions-7da8c6557863
on:
  push:
    tags:
    - "v[0-9]+.[0-9]+.[0-9]+"
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    - name: Verify commit exists in origin/main
      run: git branch --remote --contains | grep origin/main
    - name: Set VERSION variable from tag
      run: echo "VERSION=${GITHUB_REF/refs\/tags\/v/}" >> $GITHUB_ENV
    - name: Build
      run: dotnet build --configuration Release /p:Version=${VERSION} ConsoleMarkdownRenderer.csproj
    - name: Test
      run: dotnet test --configuration Release /p:Version=${VERSION} ConsoleMarkdownRenderer.Tests
    - name: Build Example
      run: dotnet build --configuration Release /p:Version=${VERSION} ConsoleMarkdownRenderer.Example
    - name: Pack
      run: dotnet pack --configuration Release /p:Version=${VERSION} --no-build --output ./artifacts ConsoleMarkdownRenderer.csproj
    - name: Add local NuGet source
      run: dotnet nuget add source ./artifacts --name local
    - name: Build Fakes
      run: dotnet build --configuration Release /p:Version=${VERSION} /p:UsePackageReference=true ConsoleMarkdownRenderer.Fakes
    - name: Pack Fakes
      run: dotnet pack --configuration Release /p:Version=${VERSION} /p:UsePackageReference=true --no-build --output ./artifacts ConsoleMarkdownRenderer.Fakes
    - name: Test ExampleTests
      run: dotnet test --configuration Release /p:Version=${VERSION} ConsoleMarkdownRenderer.ExampleTests
    - name: Push
      run: dotnet nuget push ./artifacts/BoxOfYellow.ConsoleMarkdownRenderer.${VERSION}.nupkg --source https://api.nuget.org/v3/index.json --api-key ${API_KEY}
      env:
        API_KEY: ${{ secrets.NUGET_API_KEY }}
    - name: Push Fakes
      run: dotnet nuget push ./artifacts/BoxOfYellow.ConsoleMarkdownRenderer.Fakes.${VERSION}.nupkg --source https://api.nuget.org/v3/index.json --api-key ${API_KEY}
      env:
        API_KEY: ${{ secrets.NUGET_API_KEY }}