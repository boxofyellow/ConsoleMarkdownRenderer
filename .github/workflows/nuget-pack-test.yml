name: NuGet Pack Test
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the packages (e.g., 0.7.14)'
        required: true
        type: string
        default: '999.99.99'
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
      with:
        dotnet-version: |
          8.0.x
          10.0.x
    - name: Set VERSION variable
      run: echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
    - name: Build and pack packages
      uses: ./.github/actions/build-and-pack
      with:
        version: ${{ env.VERSION }}
    - name: Build and test (net8.0)
      uses: ./.github/actions/build-and-test
      with:
        version: ${{ env.VERSION }}
        framework: net8.0
    - name: Build and test (net10.0)
      uses: ./.github/actions/build-and-test
      with:
        version: ${{ env.VERSION }}
        framework: net10.0
    - name: Upload artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: nuget-packages
        path: ./artifacts/*.nupkg
